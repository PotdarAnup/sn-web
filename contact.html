<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Structura Nordic AB</title>
  <meta name="description" content="Contact Structura Nordic AB for façade engineering and BIM projects. Based in Gothenburg, Sweden. +46 761 715 919 · info@structuranordic.se">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:{50:'#EDF3FB',100:'#CADCF0',200:'#A8C0E0',300:'#7FA4CF',400:'#4E78A8',500:'#22487A',600:'#1B3A6B',700:'#142D55',800:'#0F1E35',900:'#0A1628'},
            gold:{300:'#FFD166',400:'#FFB800',500:'#F0A500',600:'#D4900A'},
            brand:{cyan:'#00B4D8',grey:'#8A97A8'}
          },
          fontFamily: { heading:['"Plus Jakarta Sans"','sans-serif'], body:['Inter','sans-serif'] }
        }
      }
    }
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:'Inter',sans-serif;color:#0F172A;background:#FAFAFA;-webkit-font-smoothing:antialiased}
    h1,h2,h3,h4,h5,h6{font-family:'Plus Jakarta Sans',sans-serif}
    .reveal{opacity:0;transform:translateY(28px);transition:opacity .65s cubic-bezier(.16,1,.3,1),transform .65s cubic-bezier(.16,1,.3,1)}
    .reveal.visible{opacity:1;transform:translateY(0)}
    .reveal-l{opacity:0;transform:translateX(-28px);transition:opacity .65s cubic-bezier(.16,1,.3,1),transform .65s cubic-bezier(.16,1,.3,1)}
    .reveal-l.visible{opacity:1;transform:translateX(0)}
    .reveal-r{opacity:0;transform:translateX(28px);transition:opacity .65s cubic-bezier(.16,1,.3,1),transform .65s cubic-bezier(.16,1,.3,1)}
    .reveal-r.visible{opacity:1;transform:translateX(0)}
    .d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}
    @keyframes heroUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .ha{animation:heroUp .8s cubic-bezier(.16,1,.3,1) both}
    .ha:nth-child(1){animation-delay:.1s}.ha:nth-child(2){animation-delay:.25s}.ha:nth-child(3){animation-delay:.4s}
    .nav-glass{background:rgba(250,250,250,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(226,232,240,.8)}
    .lbl{font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#F0A500}
    .form-input{width:100%;padding:.75rem 1rem;border:1.5px solid #E2E8F0;border-radius:.75rem;font-size:.875rem;color:#0F172A;background:#fff;transition:border-color .2s,box-shadow .2s;outline:none;font-family:'Inter',sans-serif}
    .form-input:focus{border-color:#0F1E35;box-shadow:0 0 0 3px rgba(15,30,53,.08)}
    .form-input::placeholder{color:#94A3B8}
    .form-label{display:block;font-size:.8rem;font-weight:600;color:#334155;margin-bottom:.4rem}
    @media(prefers-reduced-motion:reduce){.reveal,.reveal-l,.reveal-r{opacity:1;transform:none;transition:none}.ha{animation:none;opacity:1}*{transition-duration:.01ms!important;animation-duration:.01ms!important}}
  </style>
</head>

<body
  x-data="{
    lang:localStorage.getItem('sn-lang')||'en',
    navOpen:false,
    scrolled:false,
    submitted:false,
    sending:false,
    form:{name:'',email:'',company:'',service:'',message:''},
    t(e,s,d,i){const v={en:e,sv:s,de:d,it:i};return v[this.lang]??e},
    setLang(l){this.lang=l;localStorage.setItem('sn-lang',l)},
    async handleSubmit(){
      this.sending=true;
      await new Promise(r=>setTimeout(r,1200));
      this.sending=false;
      this.submitted=true;
    }
  }"
  x-init="window.addEventListener('scroll',()=>{scrolled=window.scrollY>60})"
  :lang="lang">

<!-- NAV -->
<header :class="scrolled?'nav-glass shadow-sm':'bg-white/80 backdrop-blur'" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-5 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center cursor-pointer flex-shrink-0"><img src="../Company Logo/Logo Structura Nordic AB.png" alt="Structura Nordic AB" class="h-[60px] w-auto rounded-lg"></a>
      <nav class="hidden md:flex items-center gap-7">
        <a href="index.html" class="text-sm font-medium text-slate-600 hover:text-navy-800 transition-colors cursor-pointer" x-text="t('Home','Hem','Startseite','Home')"></a>
        <a href="about.html" class="text-sm font-medium text-slate-600 hover:text-navy-800 transition-colors cursor-pointer" x-text="t('About','Om Oss','Über Uns','Chi Siamo')"></a>
        <a href="services.html" class="text-sm font-medium text-slate-600 hover:text-navy-800 transition-colors cursor-pointer" x-text="t('Services','Tjänster','Leistungen','Servizi')"></a>
        <a href="projects.html" class="text-sm font-medium text-slate-600 hover:text-navy-800 transition-colors cursor-pointer" x-text="t('Projects','Projekt','Projekte','Progetti')"></a>
        <a href="contact.html" class="text-sm font-semibold text-navy-900 border-b-2 border-navy-800 pb-0.5 cursor-pointer" x-text="t('Contact','Kontakt','Kontakt','Contatto')"></a>
      </nav>
      <div class="hidden md:flex items-center gap-3">
        <div class="relative" x-data="{langOpen:false}">
          <button @click="langOpen=!langOpen" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-slate-200 text-xs font-bold text-slate-600 hover:border-navy-800 hover:text-navy-800 transition-all cursor-pointer select-none">
            <span x-text="{'en':'🇬🇧','sv':'🇸🇪','de':'🇩🇪','it':'🇮🇹'}[lang]"></span>
            <span x-text="lang.toUpperCase()"></span>
            <svg class="w-3 h-3 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div x-show="langOpen" @click.away="langOpen=false" x-transition class="absolute right-0 top-full mt-2 bg-white rounded-xl shadow-lg border border-slate-100 py-1 z-[60] min-w-[130px]">
            <button @click="setLang('en');langOpen=false" :class="lang==='en'?'bg-slate-50 text-navy-800 font-semibold':'text-slate-600'" class="flex items-center gap-2 w-full px-3 py-2 text-xs hover:bg-slate-50 transition-colors">🇬🇧 English</button>
            <button @click="setLang('sv');langOpen=false" :class="lang==='sv'?'bg-slate-50 text-navy-800 font-semibold':'text-slate-600'" class="flex items-center gap-2 w-full px-3 py-2 text-xs hover:bg-slate-50 transition-colors">🇸🇪 Svenska</button>
            <button @click="setLang('de');langOpen=false" :class="lang==='de'?'bg-slate-50 text-navy-800 font-semibold':'text-slate-600'" class="flex items-center gap-2 w-full px-3 py-2 text-xs hover:bg-slate-50 transition-colors">🇩🇪 Deutsch</button>
            <button @click="setLang('it');langOpen=false" :class="lang==='it'?'bg-slate-50 text-navy-800 font-semibold':'text-slate-600'" class="flex items-center gap-2 w-full px-3 py-2 text-xs hover:bg-slate-50 transition-colors">🇮🇹 Italiano</button>
          </div>
        </div>
        <a href="contact.html" class="px-5 py-2 bg-navy-800 text-white text-sm font-semibold rounded-full hover:bg-navy-700 transition-colors cursor-pointer" x-text="t('Get in Touch','Kontakta Oss','Kontakt aufnehmen','Contattaci')"></a>
      </div>
      <button @click="navOpen=!navOpen" class="md:hidden p-2 text-navy-900 cursor-pointer" aria-label="Menu">
        <svg x-show="!navOpen" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        <svg x-show="navOpen" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
  <div x-show="navOpen" x-transition class="md:hidden nav-glass px-5 pb-5 pt-3">
    <nav class="flex flex-col gap-1">
      <a href="index.html" class="text-sm text-slate-700 py-2.5 border-b border-slate-100 cursor-pointer" x-text="t('Home','Hem','Startseite','Home')"></a>
      <a href="about.html" class="text-sm text-slate-700 py-2.5 border-b border-slate-100 cursor-pointer" x-text="t('About','Om Oss','Über Uns','Chi Siamo')"></a>
      <a href="services.html" class="text-sm text-slate-700 py-2.5 border-b border-slate-100 cursor-pointer" x-text="t('Services','Tjänster','Leistungen','Servizi')"></a>
      <a href="projects.html" class="text-sm text-slate-700 py-2.5 border-b border-slate-100 cursor-pointer" x-text="t('Projects','Projekt','Projekte','Progetti')"></a>
      <a href="contact.html" class="text-sm font-semibold text-navy-900 py-2.5 cursor-pointer" x-text="t('Contact','Kontakt','Kontakt','Contatto')"></a>
    </nav>
    <div class="mt-4 flex items-center gap-3">
      <div class="flex items-center gap-1.5 flex-wrap">
        <button @click="setLang('en')" :class="lang==='en'?'bg-navy-800 text-white border-navy-800':'border-slate-200 text-slate-500'" class="px-2 py-1 rounded-full border text-xs font-bold cursor-pointer transition-all">🇬🇧 EN</button>
        <button @click="setLang('sv')" :class="lang==='sv'?'bg-navy-800 text-white border-navy-800':'border-slate-200 text-slate-500'" class="px-2 py-1 rounded-full border text-xs font-bold cursor-pointer transition-all">🇸🇪 SV</button>
        <button @click="setLang('de')" :class="lang==='de'?'bg-navy-800 text-white border-navy-800':'border-slate-200 text-slate-500'" class="px-2 py-1 rounded-full border text-xs font-bold cursor-pointer transition-all">🇩🇪 DE</button>
        <button @click="setLang('it')" :class="lang==='it'?'bg-navy-800 text-white border-navy-800':'border-slate-200 text-slate-500'" class="px-2 py-1 rounded-full border text-xs font-bold cursor-pointer transition-all">🇮🇹 IT</button>
      </div>
      <a href="contact.html" class="flex-1 text-center py-2.5 bg-navy-800 text-white text-sm font-semibold rounded-full cursor-pointer" x-text="t('Get in Touch','Kontakta Oss','Kontakt aufnehmen','Contattaci')"></a>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="pt-32 pb-16 bg-white relative overflow-hidden">
  <div class="absolute inset-0 pointer-events-none select-none" aria-hidden="true">
    <img src="../Company Logo/Logo Structura Nordic AB.png" alt="" class="w-full h-full object-cover" style="opacity:0.20;">
  </div>
  <div class="max-w-7xl mx-auto px-5 lg:px-8 relative z-10">
    <div class="max-w-2xl">
      <div class="ha"><span class="lbl" x-text="t('Let\'s Talk','Låt Oss Prata','Sprechen wir','Parliamo')"></span></div>
      <h1 class="ha mt-4 font-heading font-extrabold text-navy-900 leading-tight" style="font-size:clamp(2.4rem,5vw,4rem)"
          x-text="t('Get in Touch','Kontakta Oss','Kontakt aufnehmen','Contattaci')">
      </h1>
      <p class="ha mt-5 text-slate-600 leading-relaxed" style="font-size:clamp(1rem,1.8vw,1.1rem)"
         x-text="t('Tell us about your project and we\'ll get back to you within one business day. Based in Gothenburg, Sweden — working globally.','Berätta om ditt projekt och vi återkommer inom en arbetsdag. Med säte i Göteborg, Sverige — arbetar globalt.','Erzählen Sie uns von Ihrem Projekt und wir melden uns innerhalb eines Werktages. Mit Sitz in Göteborg, Schweden — weltweit tätig.','Raccontateci del vostro progetto e vi risponderemo entro un giorno lavorativo. Con sede a Göteborg, Svezia — operativi a livello globale.')">
      </p>
    </div>
  </div>
</section>

<!-- CONTACT FORM + INFO -->
<section class="py-16 pb-24 bg-white">
  <div class="max-w-7xl mx-auto px-5 lg:px-8">
    <div class="grid lg:grid-cols-5 gap-14 lg:gap-20">

      <!-- FORM -->
      <div class="lg:col-span-3 reveal-l">
        <!-- Success state -->
        <div x-show="submitted" x-transition class="bg-emerald-50 border border-emerald-200 rounded-2xl p-8 text-center">
          <div class="w-14 h-14 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          </div>
          <h3 class="text-xl font-heading font-extrabold text-navy-900" x-text="t('Message Sent!','Meddelande Skickat!','Nachricht gesendet!','Messaggio inviato!')"></h3>
          <p class="mt-2 text-slate-600 text-sm" x-text="t('Thank you for reaching out. We\'ll get back to you within one business day.','Tack för att du hörde av dig. Vi återkommer inom en arbetsdag.','Vielen Dank für Ihre Nachricht. Wir melden uns innerhalb eines Werktages.','Grazie per averci contattato. Vi risponderemo entro un giorno lavorativo.')"></p>
          <button @click="submitted=false;form={name:'',email:'',company:'',service:'',message:''}" class="mt-6 px-5 py-2.5 bg-navy-800 text-white text-sm font-semibold rounded-full hover:bg-navy-700 transition-colors cursor-pointer" x-text="t('Send Another','Skicka Igen','Weitere Nachricht senden','Invia un\'altra')"></button>
        </div>

        <!-- Form -->
        <form x-show="!submitted" @submit.prevent="handleSubmit" class="space-y-5" novalidate>
          <div class="grid sm:grid-cols-2 gap-5">
            <div>
              <label class="form-label" x-text="t('Your Name *','Ditt Namn *','Ihr Name *','Il Vostro Nome *')"></label>
              <input type="text" x-model="form.name" required class="form-input" :placeholder="t('Premchand Potdar','Förnamn Efternamn','Vorname Nachname','Nome Cognome')" aria-label="Name">
            </div>
            <div>
              <label class="form-label" x-text="t('Email Address *','E-postadress *','E-Mail-Adresse *','Indirizzo Email *')"></label>
              <input type="email" x-model="form.email" required class="form-input" placeholder="email@company.com" aria-label="Email">
            </div>
          </div>
          <div class="grid sm:grid-cols-2 gap-5">
            <div>
              <label class="form-label" x-text="t('Company / Organization','Företag / Organisation','Unternehmen / Organisation','Azienda / Organizzazione')"></label>
              <input type="text" x-model="form.company" class="form-input" :placeholder="t('Company name','Företagsnamn','Unternehmensname','Nome azienda')" aria-label="Company">
            </div>
            <div>
              <label class="form-label" x-text="t('Service Needed','Tjänst som Behövs','Benötigte Leistung','Servizio Richiesto')"></label>
              <select x-model="form.service" class="form-input cursor-pointer" aria-label="Service">
                <option value="" x-text="t('Select a service…','Välj en tjänst…','Leistung auswählen…','Seleziona un servizio…')"></option>
                <option x-text="t('Façade Design & Engineering','Fasaddesign & Teknik','Fassadendesign & Technik','Design & Ingegneria di Facciata')"></option>
                <option x-text="t('BIM & 3D Modeling','BIM & 3D-Modellering','BIM & 3D-Modellierung','BIM & Modellazione 3D')"></option>
                <option x-text="t('Shop Drawings & Documentation','Verkstadsritningar & Dokumentation','Werkstattzeichnungen & Dokumentation','Disegni di Officina & Documentazione')"></option>
                <option x-text="t('Engineering & Structural Analysis','Konstruktion & Strukturanalys','Ingenieur- & Statikanalyse','Ingegneria & Analisi Strutturale')"></option>
                <option x-text="t('Project Support Services','Projektstödtjänster','Projektunterstützungsleistungen','Servizi di Supporto al Progetto')"></option>
                <option x-text="t('Automation & Digital Engineering','Automation & Digital Teknik','Automatisierung & Digitales Engineering','Automazione & Ingegneria Digitale')"></option>
                <option x-text="t('Other / Multiple Services','Annat / Flera Tjänster','Andere / Mehrere Leistungen','Altro / Più Servizi')"></option>
              </select>
            </div>
          </div>
          <div>
            <label class="form-label" x-text="t('Project Description *','Projektbeskrivning *','Projektbeschreibung *','Descrizione del Progetto *')"></label>
            <textarea x-model="form.message" required rows="6" class="form-input resize-none"
              :placeholder="t('Briefly describe your project — system type, scope, location, timeline, and any specific software requirements...','Beskriv kort ditt projekt — systemtyp, omfång, plats, tidslinje och eventuella specifika programvarukrav...','Beschreiben Sie kurz Ihr Projekt — Systemtyp, Umfang, Standort, Zeitplan und spezifische Softwareanforderungen...','Descrivi brevemente il tuo progetto — tipo di sistema, portata, posizione, tempi e requisiti software specifici...')"
              aria-label="Message"></textarea>
          </div>
          <button
            type="submit"
            :disabled="sending || !form.name || !form.email || !form.message"
            class="w-full sm:w-auto inline-flex items-center justify-center gap-3 px-8 py-3.5 bg-navy-800 text-white font-semibold rounded-full transition-all cursor-pointer text-sm disabled:opacity-50 disabled:cursor-not-allowed hover:bg-navy-700">
            <span x-show="!sending" x-text="t('Send Message','Skicka Meddelande','Nachricht senden','Invia Messaggio')"></span>
            <span x-show="sending" class="flex items-center gap-2">
              <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
              <span x-text="t('Sending…','Skickar…','Wird gesendet…','Invio in corso…')"></span>
            </span>
            <svg x-show="!sending" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
          </button>
          <p class="text-xs text-slate-400" x-text="t('* Required fields. We respond within 1 business day.','* Obligatoriska fält. Vi svarar inom 1 arbetsdag.','* Pflichtfelder. Wir antworten innerhalb von 1 Werktag.','* Campi obbligatori. Rispondiamo entro 1 giorno lavorativo.')"></p>
        </form>
      </div>

      <!-- CONTACT INFO -->
      <div class="lg:col-span-2 reveal-r">
        <!-- Director card -->
        <div class="bg-navy-800 rounded-2xl p-6 mb-6">
          <div class="flex items-center gap-4 mb-4">
            <img src="../Company Logo/Prem photo.jpeg" alt="Premchand Potdar" class="w-14 h-14 rounded-full object-cover object-top border-2 border-white/20">
            <div>
              <div class="font-heading font-extrabold text-white">Premchand Potdar</div>
              <div class="text-blue-300 text-xs mt-0.5" x-text="t('Owner & Director','Ägare & Direktör','Inhaber & Direktor','Proprietario & Direttore')"></div>
            </div>
          </div>
          <p class="text-blue-200 text-sm leading-relaxed"
             x-text="t('Available for façade engineering projects, BIM coordination, and consulting partnerships across Europe and globally.','Tillgänglig för fasadingenjörsprojekt, BIM-koordinering och konsultpartnerskap i Europa och globalt.','Verfügbar für Fassadenengineering-Projekte, BIM-Koordinierung und Beratungspartnerschaften in Europa und weltweit.','Disponibile per progetti di ingegneria di facciata, coordinamento BIM e partnership di consulenza in Europa e a livello globale.')">
          </p>
        </div>

        <!-- Contact details -->
        <div class="space-y-4 mb-8">
          <a href="tel:+46761715919" class="flex items-start gap-4 p-4 bg-slate-50 rounded-xl border border-slate-100 hover:border-navy-200 hover:bg-navy-50 transition-all cursor-pointer group">
            <div class="w-10 h-10 bg-white rounded-lg border border-slate-200 flex items-center justify-center flex-shrink-0 group-hover:border-navy-300 transition-colors">
              <svg class="w-5 h-5 text-navy-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
            </div>
            <div>
              <div class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-0.5" x-text="t('Phone','Telefon','Telefon','Telefono')"></div>
              <div class="font-semibold text-navy-900 text-sm">+46 761 715 919</div>
            </div>
          </a>

          <a href="mailto:info@structuranordic.se" class="flex items-start gap-4 p-4 bg-slate-50 rounded-xl border border-slate-100 hover:border-navy-200 hover:bg-navy-50 transition-all cursor-pointer group">
            <div class="w-10 h-10 bg-white rounded-lg border border-slate-200 flex items-center justify-center flex-shrink-0 group-hover:border-navy-300 transition-colors">
              <svg class="w-5 h-5 text-navy-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <div>
              <div class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-0.5" x-text="t('Email','E-post','E-Mail','Email')"></div>
              <div class="font-semibold text-navy-900 text-sm">info@structuranordic.se</div>
            </div>
          </a>
